<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한자 사전 — 한국어로 한자 찾기</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <header>
    <div class="header-top">
      <div class="logo">漢字</div>
      <div class="logo-sub">한국어로 한자 찾기</div>
      <div class="dict-total">수록 단어 <span id="dictTotal">0</span>개</div>
    </div>

    <div class="autocomplete-wrap">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="예: 대국적, 인과응보, 감동…" autocomplete="off" spellcheck="false">
        <button class="btn-icon" id="btnClear" title="지우기">✕</button>
      </div>
      <div class="autocomplete-list" id="acList"></div>
    </div>

    <div class="cat-bar" id="catBar"></div>
  </header>

  <main>
    <div class="result-bar">
      <div class="result-bar-left">
        <span id="resultCount"></span>
      </div>
      <button class="btn-random" id="btnRandom">🎲 랜덤 단어</button>
    </div>

    <div id="results"></div>

    <div id="emptyState">
      <div class="empty-icon">漢</div>
      <div class="empty-msg">한국어 단어를 입력하세요</div>
      <div class="example-chips"></div>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
