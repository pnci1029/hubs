<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카드 샘플 — 실루엣 아트</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #060614;
  color: #eeeeff;
  font-family: 'Segoe UI', 'Noto Sans KR', system-ui, sans-serif;
  padding: 40px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
h2 {
  font-size: 11px;
  color: #44446a;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.row { display: flex; gap: 18px; flex-wrap: wrap; align-items: flex-start; }

/* ── 카드 프레임 ── */
.card {
  width: 120px;
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: transform .18s cubic-bezier(.2,.8,.4,1.2), box-shadow .18s;
  position: relative;
}
.card:hover { transform: translateY(-10px) scale(1.06); }

.card.unit     { border: 1.5px solid rgba(239,83,80,.55);   box-shadow: 0 0 18px rgba(239,83,80,.12); }
.card.resource { border: 1.5px solid rgba(41,182,246,.45);  box-shadow: 0 0 18px rgba(41,182,246,.1); }
.card.effect   { border: 1.5px solid rgba(171,71,188,.5);   box-shadow: 0 0 18px rgba(171,71,188,.1); }

/* 상단 컬러 선 */
.card.unit::before     { content:''; display:block; height:2px; background:#ef5350; box-shadow:0 0 8px rgba(239,83,80,.7); }
.card.resource::before { content:''; display:block; height:2px; background:#29b6f6; box-shadow:0 0 8px rgba(41,182,246,.7); }
.card.effect::before   { content:''; display:block; height:2px; background:#ab47bc; box-shadow:0 0 8px rgba(171,71,188,.7); }

/* ── 아트 영역 ── */
.card-art {
  position: relative;
  height: 80px;
  overflow: hidden;
}
.card-art svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ── 정보 영역 ── */
.card-info {
  background: #0d0d22;
  padding: 7px 9px 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.card-name {
  font-size: 12.5px;
  font-weight: 800;
  letter-spacing: .2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1;
}
.card-cost {
  font-size: 12px;
  font-weight: 800;
  color: #ffd740;
  flex-shrink: 0;
  font-family: monospace;
}
.card-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 1px;
}
.type-pill {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  padding: 1px 6px;
  border-radius: 3px;
}
.unit     .type-pill { color:#ef5350; background:rgba(239,83,80,.14); border:1px solid rgba(239,83,80,.3); }
.resource .type-pill { color:#29b6f6; background:rgba(41,182,246,.12); border:1px solid rgba(41,182,246,.25); }
.effect   .type-pill { color:#ab47bc; background:rgba(171,71,188,.12); border:1px solid rgba(171,71,188,.25); }
.stat-num {
  font-size: 11px;
  font-weight: 900;
  font-family: monospace;
}
.unit .stat-num     { color: #ef5350; }
.resource .stat-num { color: #29b6f6; }
.effect .stat-num   { color: #ab47bc; }

.card-desc {
  font-size: 9.5px;
  color: #7070aa;
  line-height: 1.35;
}
.card-flavor {
  font-size: 8px;
  color: #383860;
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding-top: 3px;
  border-top: 1px solid rgba(255,255,255,.03);
  margin-top: 2px;
}
</style>
</head>
